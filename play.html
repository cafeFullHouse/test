<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おぢさんもんじゃ</title>
    <style>
        #recordingAudios audio{
            width: 66.6666%;
            max-width: none; 
            margin: 10px 0;
            display: block;
            transform-origin: center;
        }

        #recordBtn{
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            background: #ec84a7;
            color: white;
            margin: 0px 10px;
            padding: 7px 15px;
            border-radius: 20px;
        }

        #stopBtn{
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            background: #84bdec;
            color: white;
            margin: 0px 10px;
            padding: 7px 15px;
            border-radius: 20px;
        }

        button:disabled {
            filter: saturate(0.1);
            cursor: not-allowed;
        }

    </style>
</head>
<body>
    <div id="counter">1/12</div>

    <img id="displayImg" src="" alt="">
    
    <button id="recordBtn">● 録音開始</button>
    <button id="stopBtn" disabled>■ 停止</button>

    <h3>録音した音声</h3>
    <div id="recordingAudios">
        <audio id="audio" src="" controls></audio>
    </div>

    <button id="nextBtn" disabled>NEXT</button>

    <script src="recordAndPlay.js"></script>
</body>
</html>
